<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Lumenci Assistant</title><script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/><script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"]}}}}</script><style>body{font-family:Inter,sans-serif}h1,h2,h3{font-family:"Plus Jakarta Sans",sans-serif}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}.tog{position:relative;display:inline-block;width:44px;height:24px;cursor:pointer}.tog input{display:none}.sld{position:absolute;inset:0;background:#cbd5e1;border-radius:24px;transition:.3s}.sld:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:.3s}.tog input:checked+.sld{background:#1e40af}.tog input:checked+.sld:before{transform:translateX(20px)}</style></head>

<script type="text/babel">
const {useState,useRef,useEffect}=React;
const CLAIMS=[{id:'CLM-001',patent:'US123456',element:'Wireless module',status:'ACTIVE',conf:92,updated:'2 hours ago'},{id:'CLM-002',patent:'US123456',element:'Motion sensor',status:'ACTIVE',conf:88,updated:'2 hours ago'},{id:'CLM-003',patent:'US123456',element:'ML Algorithm',status:'NEEDS_REVIEW',conf:45,updated:'3 hours ago'},{id:'CLM-004',patent:'US789012',element:'Temperature sensor',status:'IN_REVIEW',conf:78,updated:'Yesterday'},{id:'CLM-005',patent:'US345678',element:'Data processor',status:'DRAFT',conf:20,updated:'3 days ago'}];
const TEAM=[{n:'Elena Vance',e:'elena.vance@lumenci.com',r:'Admin',s:'Active',j:'Jan 12, 2024',i:'EV',c:'#1e40af'},{n:'Marcus Thorne',e:'m.thorne@lumenci.com',r:'Analyst',s:'Active',j:'Feb 05, 2024',i:'MT',c:'#047857'},{n:'Sarah Chen',e:'s.chen@lumenci.com',r:'Reviewer',s:'Pending',j:'Mar 18, 2024',i:'SC',c:'#7c3aed'},{n:'David Miller',e:'d.miller@lumenci.com',r:'Analyst',s:'Active',j:'Apr 02, 2024',i:'DM',c:'#b45309'}];
const INTS=[{name:'Microsoft Word',desc:'Draft legal briefs with AI citation.',status:'CONNECTED',sync:'2m ago'},{name:'Google Drive',desc:'Auto-index PDFs to case folders.',status:'CONNECTED',sync:'1h ago'},{name:'Slack',desc:'Instant case notifications.',status:'CONNECT'},{name:'Westlaw',desc:'Premium legal research.',status:'CONNECTED',sync:'Active'},{name:'LexisNexis',desc:'Citations and litigation analytics.',status:'CONNECT'}];
const DEMO_CONVERSATIONS = [
{id:1,category:"Strengthen Evidence",userMessage:"The AI reasoning for the ML algorithm element is weak - add more technical details",aiResponse:"I have analyzed Element 3. The current reasoning lacks technical depth. Here is a stronger version referencing specific ML architecture terminology.",update:{elementId:3,field:"aiReasoning",newValue:"Acme Auto-Schedule feature demonstrates supervised machine learning behavior consistent with a neural network or decision tree model trained on temporal user interaction data. The system adapts setpoint temperatures based on historical patterns, satisfying the claim requirement for an algorithm that learns preferences over time. Technical patent literature confirms this maps directly to claim element 3."}},
{id:2,category:"Strengthen Evidence",userMessage:"Strengthen the evidence for the wireless communication module",aiResponse:"The current evidence for Element 1 is adequate but can be technically reinforced. Here is an improved version.",update:{elementId:1,field:"evidence",newValue:"Acme Thermostat FCC filing ID: 2ABCD-THERMO1 confirms 802.11 b/g/n WiFi radio module operating at 2.4GHz. Product teardown by iFixit (Oct 2023) identified Broadcom BCM43362 wireless chip. This satisfies the wireless communication module claim element."}},
{id:3,category:"Strengthen Evidence",userMessage:"Add technical documentation for the motion sensor claim",aiResponse:"I found stronger technical evidence for the motion sensor element. Here is the updated evidence.",update:{elementId:2,field:"evidence",newValue:"Acme Engineering Datasheet v2.1 page 14 specifies: Passive Infrared sensor PIR model SR501 with 120 degree detection angle and 7 meter range. Firmware changelog v3.2.1 confirms occupancy detection algorithm using PIR interrupt signals mapped directly to HVAC scheduling logic."}},
{id:4,category:"Strengthen Evidence",userMessage:"The evidence for element 2 is from marketing only, need technical proof",aiResponse:"You are correct. Marketing materials alone are weak evidence. Here is technical documentation evidence instead.",update:{elementId:2,field:"evidence",newValue:"Acme SmartHome SDK documentation section 4.3 states: OccupancyDetector class uses hardware interrupt from PIR sensor pin GPIO17 to trigger presence detection events. This is direct technical evidence of the motion sensor for occupancy detection as claimed."}},
{id:5,category:"Strengthen Evidence",userMessage:"Can you find better evidence from a technical specification document",aiResponse:"Based on typical product documentation patterns, here is what stronger technical spec evidence would look like for this claim chart.",update:{elementId:3,field:"evidence",newValue:"Acme firmware source code repository (GitHub acmecorp/thermostat commit a3f91b2) contains TempPreferenceLearning Module with gradient descent optimizer updating weights every 24 hours based on manual override events. This is direct source code evidence of the ML algorithm learning user preferences."}},
{id:6,category:"Fix Reasoning",userMessage:"The AI reasoning for element 3 is vague, need more specific analysis",aiResponse:"Agreed. The current reasoning is too general. Here is specific technical analysis for the ML algorithm element.",update:{elementId:3,field:"aiReasoning",newValue:"The Auto-Schedule feature constitutes a machine learning algorithm under the doctrine of equivalents. Specifically, the adaptive temperature scheduling performs function (learn preferences), way (analyzing historical setpoint adjustments), result (predicting future preferred temperatures) identical to the claimed ML algorithm. Federal Circuit precedent in Graver Tank supports this mapping."}},
{id:7,category:"Fix Reasoning",userMessage:"Rewrite the reasoning to address potential claim construction arguments from the defense",aiResponse:"Here is a legally robust version of the reasoning that anticipates and addresses common defense arguments.",update:{elementId:3,field:"aiReasoning",newValue:"Even under the narrowest claim construction of machine learning algorithm, the Acme Auto-Schedule satisfies this limitation. Defense argument that marketing language is insufficient is pre-empted by firmware v3.2 release notes which explicitly reference a trained model with configurable learning rate parameter. This constitutes direct infringement under 35 USC 271(a)."}},
{id:8,category:"Fix Reasoning",userMessage:"The reasoning for element 1 does not mention the specific WiFi standard",aiResponse:"Good catch. Here is updated reasoning that includes the specific wireless standard details.",update:{elementId:1,field:"aiReasoning",newValue:"The Acme Thermostat implements IEEE 802.11 WiFi protocol which falls squarely within the claim scope of wireless communication module. The claimed invention does not limit the wireless standard, therefore 802.11 WiFi satisfies this limitation both literally and under doctrine of equivalents. FCC certification confirms RF transmission capability."}},
{id:9,category:"Fix Reasoning",userMessage:"Make the reasoning more formal for use in legal proceedings",aiResponse:"Here is a formally structured legal reasoning suitable for court submission documents.",update:{elementId:2,field:"aiReasoning",newValue:"The accused product literally infringes the motion sensor claim limitation. Claim element requires: (1) a motion sensor and (2) for detecting occupancy. The Acme technical datasheet confirms presence of PIR sensor satisfying element (1). The firmware OccupancyDetector class satisfies element (2). Both limitations are met literally. No claim construction dispute anticipated."}},
{id:10,category:"Fix Reasoning",userMessage:"The reasoning does not cite any legal standards or precedents",aiResponse:"Here is updated reasoning with proper legal citation framework.",update:{elementId:1,field:"aiReasoning",newValue:"Under the Phillips v AWH claim construction standard, wireless communication module is construed in light of the specification to include any radio frequency communication system. The Acme WiFi module satisfies this construction. See also parties agreed claim construction in pretrial order defining wireless as including IEEE 802.11 protocols."}},
{id:11,category:"Add Missing Features",userMessage:"AI missed that Acme also has a temperature sensor array",aiResponse:"You are correct. This is an important missing feature. I will add a new claim element for the temperature sensor array.",update:{elementId:1,field:"evidence",newValue:"Acme product page confirms primary temperature sensor plus secondary ambient sensor array with 3 distributed measurement points. Datasheet shows NTC thermistor array model TMP36 at locations: main unit, remote sensor 1, remote sensor 2. This exceeds the single temperature control device claimed in the patent."}},
{id:12,category:"Add Missing Features",userMessage:"What features am I missing in the accused product analysis",aiResponse:"Based on my analysis of the current claim chart I have identified 3 potentially missing features that should be mapped to claim elements: 1. Remote access via mobile app 2. Energy usage reporting dashboard 3. Integration with smart home platforms like Amazon Alexa and Google Home. Would you like me to add evidence for any of these?"},
{id:13,category:"Add Missing Features",userMessage:"Add the geofencing feature to the claim chart",aiResponse:"Geofencing is an important feature. Here is the evidence mapping for geofencing capability.",update:{elementId:1,field:"evidence",newValue:"Acme app v4.2 release notes confirm geofencing feature using device GPS coordinates to trigger temperature adjustments when user is within 1 mile of home. This extends the wireless communication module claim to include location-aware remote control functionality."}},
{id:14,category:"Add Missing Features",userMessage:"The voice control feature is not mapped in the chart",aiResponse:"Voice control is a relevant feature for the wireless communication module claim. Here is the evidence.",update:{elementId:1,field:"evidence",newValue:"Acme Thermostat supports Amazon Alexa and Google Assistant voice commands via WiFi. User manual page 23 confirms: Set temperature using voice command through your smart speaker. This is additional evidence of the wireless communication module operating as claimed."}},
{id:15,category:"Add Missing Features",userMessage:"Include the over the air update feature as evidence",aiResponse:"OTA updates are strong additional evidence for the wireless communication module. Here is the updated evidence.",update:{elementId:1,field:"evidence",newValue:"Acme support documentation confirms automatic firmware updates delivered over WiFi connection. Version history shows 12 OTA updates since product launch. This demonstrates bidirectional wireless communication capability beyond what is claimed, strengthening the infringement analysis."}},
{id:16,category:"Legal Language",userMessage:"Rewrite element 3 reasoning using doctrine of equivalents",aiResponse:"Here is the reasoning rewritten using doctrine of equivalents legal framework.",update:{elementId:3,field:"aiReasoning",newValue:"Under the doctrine of equivalents per Hilton Davis Chemical Co v Warner Jenkinson, the Acme Auto-Schedule performs substantially the same function (learning temperature preferences) in substantially the same way (analyzing historical user inputs) to achieve substantially the same result (automated temperature optimization) as the claimed ML algorithm. Infringement established under DOE."}},
{id:17,category:"Legal Language",userMessage:"Add prosecution history estoppel analysis to element 1",aiResponse:"Here is prosecution history estoppel analysis for the wireless communication module claim.",update:{elementId:1,field:"aiReasoning",newValue:"Review of prosecution history for patent US123456 shows no amendments were made to the wireless communication module limitation during examination. Therefore no prosecution history estoppel applies and the full range of equivalents is available. The Acme WiFi module falls within both literal scope and equivalents of this claim."}},
{id:18,category:"Legal Language",userMessage:"Does the accused product literally infringe all claim elements",aiResponse:"Based on current evidence in the chart, here is my literal infringement analysis for all 3 elements: Element 1 (Wireless Module): YES - literal infringement confirmed by FCC filing and product specs. Element 2 (Motion Sensor): YES - literal infringement confirmed by technical datasheet. Element 3 (ML Algorithm): PARTIAL - marketing evidence suggests literal infringement but technical documentation needed to confirm. Recommend obtaining firmware source code or technical specs."},
{id:19,category:"Legal Language",userMessage:"Write a claim construction argument for machine learning algorithm",aiResponse:"Here is a claim construction argument for the ML algorithm element.",update:{elementId:3,field:"aiReasoning",newValue:"Claim construction: Machine learning algorithm should be construed broadly per Phillips standard to include any computational system that improves performance based on experience or training data. The specification supports this broad construction at col 4 lines 12-28. Under this construction, the Acme Auto-Schedule which adapts based on historical user interactions satisfies the limitation literally."}},
{id:20,category:"Legal Language",userMessage:"Add invalidity risk assessment to the reasoning",aiResponse:"Here is an invalidity risk assessment added to element 3 reasoning.",update:{elementId:3,field:"aiReasoning",newValue:"Infringement analysis: Auto-Schedule maps to ML algorithm claim. Invalidity risk assessment: MEDIUM. Potential prior art includes Nest Learning Thermostat patent US8620841 (2012) and Ecobee SmartThermostat US9696733 (2014). Recommend prior art search focused on adaptive HVAC scheduling before proceeding with litigation. Current evidence supports infringement but invalidity defense is anticipated."}},
{id:21,category:"Edge Cases",userMessage:"That evidence is completely wrong, the Acme device uses Zigbee not WiFi",aiResponse:"I apologize for the incorrect evidence. Thank you for the correction. If the Acme device uses Zigbee protocol, this actually strengthens the infringement case as Zigbee is also a wireless communication module. Please provide the source document confirming Zigbee so I can update the chart with accurate evidence."},
{id:22,category:"Edge Cases",userMessage:"The FCC filing number you cited does not exist",aiResponse:"I apologize for citing an incorrect FCC filing number. I should not have generated a specific filing ID without verified sources. Please provide the correct FCC filing number or upload the FCC certification document and I will update the evidence with accurate citation."},
{id:23,category:"Edge Cases",userMessage:"Find technical documentation for the ML algorithm implementation",aiResponse:"I could not find sufficient technical documentation for the ML algorithm implementation in the currently uploaded documents. To strengthen this claim element I need one of the following: 1. Upload Acme firmware technical specification document 2. Share URL to Acme developer documentation 3. Upload any reverse engineering report 4. Paste relevant technical text here. Once you provide this I will update the chart with verified technical evidence."},
{id:24,category:"Edge Cases",userMessage:"Can you find the source code for the Auto-Schedule feature",aiResponse:"I cannot access external websites or source code repositories directly. To obtain source code evidence I recommend: 1. File a discovery request for firmware source code in litigation 2. Check if Acme has any open source repositories on GitHub 3. Upload any decompiled or leaked technical documentation you have access to. Please upload any technical documents you obtain and I will analyze them."},
{id:25,category:"Edge Cases",userMessage:"Undo the last change you made",aiResponse:"Done. I have reverted the chart to the previous version before the last accepted change. The claim chart now shows the original reasoning text. Let me know if you would like to try a different refinement approach."},
{id:26,category:"General Analysis",userMessage:"Which element has the weakest evidence overall",aiResponse:"Based on my analysis of all 3 claim elements: Element 1 (Wireless Module): STRONG - product page evidence is clear and direct. Element 2 (Motion Sensor): STRONG - technical specs confirm PIR sensor. Element 3 (ML Algorithm): WEAK - only marketing materials, no technical documentation. Confidence score 45%. I recommend prioritizing Element 3 for immediate strengthening with technical documentation."},
{id:27,category:"General Analysis",userMessage:"Is this claim chart ready for court submission",aiResponse:"Based on current evidence quality, the chart is NOT yet ready for court submission. Issues to resolve: 1. Element 3 needs technical documentation instead of marketing materials only. 2. All elements need source citations with specific page numbers and dates. 3. Consider adding expert witness declaration to support ML algorithm mapping. 4. Invalidity risk assessment should be completed. Estimated readiness: 65%. Recommend 2-3 more refinement sessions."},
{id:28,category:"General Analysis",userMessage:"Summarize the entire infringement analysis",aiResponse:"INFRINGEMENT ANALYSIS SUMMARY\nPatent: US123456 vs Acme Thermostat\nOverall Assessment: LIKELY INFRINGES\nElement 1 - Wireless Module: STRONG MATCH. WiFi confirmed by product page and FCC filing. Confidence 92%.\nElement 2 - Motion Sensor: STRONG MATCH. PIR sensor confirmed by technical specs. Confidence 88%.\nElement 3 - ML Algorithm: WEAK MATCH. Marketing evidence only. Technical confirmation needed. Confidence 45%.\nRecommendation: Proceed with discovery request for Element 3 technical docs."},
{id:29,category:"General Analysis",userMessage:"What additional documents should I upload to strengthen this case",aiResponse:"To strengthen this infringement case I recommend uploading:\nHIGH PRIORITY: 1. Acme firmware technical specification 2. FCC certification documents 3. Patent US123456 full specification\nMEDIUM PRIORITY: 4. Acme product teardown report 5. App store description and screenshots 6. Acme SDK developer documentation\nLOW PRIORITY: 7. Consumer reviews mentioning technical features 8. Acme annual report technical sections\nUpload these and I will automatically improve the evidence for all elements."},
{id:30,category:"General Analysis",userMessage:"Compare element 2 and element 3 evidence strength",aiResponse:"EVIDENCE COMPARISON:\nElement 2 (Motion Sensor) vs Element 3 (ML Algorithm)\nElement 2 Score: 88/100 - Source type: Technical specification - Specificity: HIGH - Legal strength: STRONG\nElement 3 Score: 45/100 - Source type: Marketing materials - Specificity: LOW - Legal strength: WEAK\nRecommendation: Element 3 needs immediate technical documentation."},
{id:31,category:"Export",userMessage:"Is the chart ready to export to Word",aiResponse:"The chart can be exported now but I recommend addressing Element 3 weakness first. Current export will include all 3 elements with current evidence and reasoning. Note that Element 3 is marked as Needs Review and the Word document will reflect this. Click Export to Word to download. The document will be formatted for legal proceedings with proper headers and evidence citations."},
{id:32,category:"Export",userMessage:"What format should I export this for my attorney",aiResponse:"For attorney review I recommend exporting as Microsoft Word format because: 1. Attorneys can add comments and tracked changes 2. Easy to edit before filing 3. Compatible with legal document management systems 4. Can be converted to PDF for official filing. Click the Export to Word button on the bottom left of the claim chart panel to download the formatted document."},
{id:33,category:"Technical",userMessage:"What is the difference between literal infringement and doctrine of equivalents here",aiResponse:"For this patent and accused product:\nLITERAL INFRINGEMENT means every word of the claim matches exactly. Element 1 and 2 likely qualify for literal infringement based on current evidence.\nDOCTRINE OF EQUIVALENTS applies when the accused product does not literally match but performs substantially the same function in substantially the same way to achieve substantially the same result.\nElement 3 currently relies on DOE because marketing language does not literally say machine learning algorithm. Technical documentation would upgrade Element 3 to literal infringement."},
{id:34,category:"Technical",userMessage:"Does WiFi count as a wireless communication module",aiResponse:"YES. WiFi (IEEE 802.11) definitively qualifies as a wireless communication module for patent purposes. Supporting analysis: 1. The claim term is broad and does not specify a particular standard 2. WiFi transmits and receives data wirelessly which is the core function 3. Courts have consistently held that WiFi satisfies wireless communication claim limitations 4. The patent specification likely contemplates WiFi as a preferred embodiment. No claim construction issue anticipated for Element 1."},
{id:35,category:"Technical",userMessage:"Could the defense argue the motion sensor is not for occupancy",aiResponse:"YES this is a realistic defense argument. Potential defense position: The PIR sensor detects motion not occupancy specifically. Counter-argument strategy: 1. Obtain Acme firmware documentation showing OccupancyDetector class name 2. Show that the sensor output triggers home or away mode demonstrating occupancy detection purpose 3. Cite Acme marketing that says detects when people are home. I recommend updating Element 2 evidence to include firmware class names."},
{id:36,category:"Technical",userMessage:"What is the confidence score based on",aiResponse:"The confidence scores in this claim chart are based on:\nHIGH CONFIDENCE factors: Evidence from technical documentation, Direct product specification citations, Multiple independent sources, Specific technical language matching\nLOW CONFIDENCE factors: Evidence from marketing only, Vague or indirect language, Missing technical implementation details\nElement 1: 92% - technical + marketing\nElement 2: 88% - technical spec confirmed\nElement 3: 45% - marketing only\nTo increase Element 3 score to 80%+ obtain technical specification document."},
{id:37,category:"Technical",userMessage:"Should I file a provisional patent application based on this analysis",aiResponse:"This claim chart is for patent INFRINGEMENT analysis, not patent FILING. These are different legal processes. This chart maps an existing patent US123456 against the Acme Thermostat accused product. For patent filing questions please consult your patent attorney directly. I can help you refine the infringement analysis claim chart but cannot provide advice on whether to file new patents."},
{id:38,category:"Technical",userMessage:"How many claims does patent US123456 have",aiResponse:"Based on the current claim chart I can see 3 independent claim elements being analyzed: 1. Temperature control device with wireless communication module 2. Motion sensor for detecting occupancy 3. Machine learning algorithm for temperature preferences. However the full patent US123456 may have additional claims not shown in this chart. I recommend uploading the full patent document to analyze all claim elements for comprehensive infringement coverage."},
{id:39,category:"Technical",userMessage:"What prior art could invalidate element 3",aiResponse:"Potential prior art that could invalidate the ML algorithm claim:\nHIGH RISK: 1. Nest Learning Thermostat patent (2012) 2. Honeywell adaptive recovery patent (2008) 3. Ecobee smart algorithms (2013)\nMEDIUM RISK: 4. Academic papers on HVAC optimization using reinforcement learning pre-2015\nRecommendation: Commission a prior art search before proceeding. If prior art found, consider narrowing claim construction arguments."},
{id:40,category:"Technical",userMessage:"Is the Acme thermostat sold in the United States",aiResponse:"Based on the claim chart evidence, the Acme Thermostat product page and marketing materials suggest US market presence. However to confirm US sales for infringement under 35 USC 271: 1. Check Amazon.com and major US retailer listings 2. Obtain sales records through discovery 3. Check Acme website for US shipping and pricing 4. Review Acme SEC filings for US revenue data. I recommend uploading retail listing screenshots as additional evidence."},
{id:41,category:"Process",userMessage:"How long will it take to finalize this claim chart",aiResponse:"Based on current chart status my estimate for completion:\nElements 1 and 2: READY - 0 additional work needed.\nElement 3: 4-6 hours of additional work needed including: 1-2 hours obtain technical docs, 1-2 hours re-analyze, 1 hour legal language refinement, 1 hour attorney review.\nTotal estimated time to court-ready claim chart: 1-2 business days depending on document availability."},
{id:42,category:"Process",userMessage:"Who should review this claim chart before filing",aiResponse:"Recommended review chain for this claim chart before filing: 1. TECHNICAL EXPERT: Engineer familiar with thermostat and IoT technology to verify technical accuracy 2. PATENT ATTORNEY: Licensed attorney to review claim construction and legal sufficiency 3. LITIGATION PARTNER: Senior attorney to assess overall case strategy 4. CLIENT: Patent owner to confirm accuracy of patent interpretation. I recommend this sequence before any legal filing or court submission."},
{id:43,category:"Process",userMessage:"Can you help me prepare for a deposition about this chart",aiResponse:"I can help you prepare deposition support materials based on this claim chart. I can assist with: 1. Summary of each claim element in plain language 2. List of technical terms and definitions for reference 3. Anticipated defense questions and suggested responses 4. Evidence gaps that may be challenged under oath 5. Technical background on wireless communication, PIR sensors, and machine learning for context. What specific deposition preparation would be most helpful?"},
{id:44,category:"Process",userMessage:"Generate a list of discovery requests based on this chart",aiResponse:"DISCOVERY REQUESTS based on claim chart gaps:\nHIGH PRIORITY: 1. All firmware source code and technical specifications for Acme Thermostat versions 1.0-4.2 2. FCC certification documents and test reports 3. Engineer depositions regarding Auto-Schedule ML implementation\nMEDIUM PRIORITY: 4. All internal technical documents referencing machine learning or adaptive algorithms 5. SDK and API documentation 6. Sales records for US market. Would you like me to format these as formal discovery requests?"},
{id:45,category:"Process",userMessage:"What is the strongest argument for infringement in this chart",aiResponse:"STRONGEST INFRINGEMENT ARGUMENTS ranked by strength:\nSTRONGEST - Element 2 Motion Sensor: Technical specification explicitly names built-in motion sensor with occupancy detection. Literal infringement essentially certain.\nSTRONG - Element 1 Wireless Module: WiFi confirmed by multiple sources. Broad claim term means literal infringement highly likely.\nMODERATE - Element 3 ML Algorithm: Dependent on claim construction. Recommend leading with Element 2 in any oral argument."},
{id:46,category:"Improvement",userMessage:"How can I improve the overall confidence score of this chart",aiResponse:"To improve overall chart confidence from current average 75% to 90%+ follow these steps:\nIMMEDIATE ACTIONS: 1. Upload Acme technical datasheet to confirm Element 3 - will raise from 45% to 80% 2. Add FCC filing number to Element 1 evidence - will raise from 92% to 97%\nMEDIUM TERM: 3. Obtain firmware documentation for explicit ML algorithm reference 4. Add source code evidence if available through discovery\nRESULT: Following these steps will raise average confidence from 75% to approximately 92%."},
{id:47,category:"Improvement",userMessage:"What would make a judge more convinced by element 3",aiResponse:"To maximize judicial persuasiveness for Element 3:\nEVIDENCE UPGRADES needed: 1. Replace marketing evidence with technical specification or source code 2. Add expert witness declaration from ML engineer 3. Include comparison table showing how Auto-Schedule parameters match claimed ML algorithm steps\nREASONING UPGRADES needed: 4. Add specific Federal Circuit case citations 5. Address and preemptively rebut defense arguments 6. Include claim chart footnotes with technical definitions"},
{id:48,category:"Improvement",userMessage:"Are there any contradictions in the current claim chart",aiResponse:"After analyzing the current claim chart I found NO direct contradictions. However I identified 2 potential weaknesses that could be raised by defense:\nWEAKNESS 1 - Element 3 evidence gap: Marketing says learns preferences but reasoning claims machine learning algorithm. Defense may argue these are different things without technical documentation bridging the gap.\nWEAKNESS 2 - Missing claim element: The patent may have a claim element about a temperature sensor that is not currently mapped in this chart."},
{id:49,category:"Improvement",userMessage:"Should I add more claim elements to this chart",aiResponse:"YES I recommend expanding the claim chart. Based on the patent title there are likely additional claim elements not yet mapped including: 1. Temperature sensor specification 2. User interface or display element 3. Remote server or cloud connection 4. Power management system 5. HVAC system interface. Upload the full patent US123456 document and I will automatically identify all claim elements and create a complete mapping against the Acme Thermostat."},
{id:50,category:"Improvement",userMessage:"Rate this claim chart on a scale of 1 to 10",aiResponse:"CLAIM CHART QUALITY RATING: Overall Score: 6.5 out of 10\nBREAKDOWN: Evidence Quality: 6/10 - Two elements have technical evidence, one relies on marketing only. Legal Reasoning: 7/10 - Reasoning is clear but needs more legal citation. Completeness: 6/10 - Only 3 of potentially 8-10 claim elements are mapped. Citation Quality: 6/10 - Sources cited but lack specific page numbers. Court Readiness: 5/10 - Needs technical documentation and expert review.\nTO REACH 9/10: Address Element 3 technical evidence and expand to cover all patent claims."}
];

function Tog({on,set}){return <label className="tog"><input type="checkbox" checked={on} onChange={e=>set(e.target.checked)}/><span className="sld"></span></label>;}
function Badge({s}){const m={ACTIVE:'bg-blue-50 text-blue-700',NEEDS_REVIEW:'bg-orange-100 text-orange-700',IN_REVIEW:'bg-purple-100 text-purple-700',DRAFT:'bg-gray-100 text-gray-600',PAID:'bg-blue-50 text-blue-700',CONNECTED:'bg-green-100 text-green-700',CONNECT:'bg-gray-100 text-gray-700',Active:'bg-green-50 text-green-700',Pending:'bg-orange-50 text-orange-700'};const l={NEEDS_REVIEW:'NEEDS REVIEW',IN_REVIEW:'IN REVIEW'};return <span className={"text-[10px] font-bold px-2.5 py-1 rounded "+(m[s]||'bg-gray-100 text-gray-700')}>{l[s]||s}</span>;}
function CB({v}){const b=v>=80?'#22c55e':v>=50?'#f97316':'#ef4444';const t=v>=80?'text-green-600':v>=50?'text-orange-500':'text-red-500';return <div className="flex items-center gap-2"><span className={"text-sm font-bold "+t}>{v}%</span><div className="w-20 h-1.5 bg-gray-200 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:v+"%",background:b}}></div></div></div>;}

      if (GEMINI_KEY) {
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({contents:[{role:"user",parts:[{text:systemPrompt+"\n\nUser: "+userMessage}]}]})
          });
          if (res.ok) { const data = await res.json(); aiContent = data.candidates[0].content.parts[0].text; geminiSuccess = true; }
        } catch(e) {}
      }
      if (!geminiSuccess && OPENAI_KEY) {
        const res2 = await fetch(`https://api.openai.com/v1/chat/completions`, {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${OPENAI_KEY}`},
          body: JSON.stringify({model:"gpt-4o-mini",messages:[{role:"system",content:systemPrompt},{role:"user",content:userMessage}]})
        });
        if (res2.ok) { const data2 = await res2.json(); aiContent = data2.choices[0].message.content; }
        else { throw new Error("Both failed"); }
      } else if (!geminiSuccess) { throw new Error("Both failed"); }
    } catch (e) {
      aiContent = "Unable to process request. Please check your API keys.";
    }

    setLoading(false);
    let amendmentObj = null;
    let cleanMsg = aiContent;
    const updateMatch = aiContent.match(/<UPDATE>([\s\S]*?)<\/UPDATE>/);
    if (updateMatch) {
      try { amendmentObj = JSON.parse(updateMatch[1].trim()); cleanMsg = aiContent.replace(updateMatch[0],'').trim(); } catch(e) {}
    }
    setMsgs(m => [...m, {role:'assistant', content:cleanMsg, amendment:amendmentObj}]);
  };

  const activeChips = ['Strengthen Evidence','Fix Reasoning','Add Missing Feature','Clarify Legal Language'];

  const handleChipClick = (label) => {
    let msg = "";
    if (label === 'Strengthen Evidence') msg = "Strengthen the evidence for the weak claim element";
    if (label === 'Fix Reasoning') msg = "The AI reasoning needs to be more specific and technical";
    if (label === 'Add Missing Feature') msg = "What features am I missing in the accused product analysis?";
    if (label === 'Clarify Legal Language') msg = "Rewrite the reasoning using clearer legal language for court proceedings";
    setChipsVisible(false);
    sendMessage(msg);
  };

  const handleAccept = (msgIndex) => {
    const msg = msgs[msgIndex];
    const updatedMsgs = [...msgs];
    updatedMsgs[msgIndex] = { ...msg, accepted: true };
    const am = msg.amendment;
    if (!am) return;
    setHistory([...history, chartData.map(c => ({...c}))]);
    let oldConf = 0;
    let newConf = Math.floor(Math.random() * (95 - 80 + 1)) + 80;
    const newData = chartData.map(c => {
      if (c.id === am.elementId) {
        oldConf = typeof c.conf === 'string' ? (c.conf === 'NEEDS REVIEW' ? 45 : 50) : parseInt(c.conf) || 45;
        return {...c, spec: am.newValue, conf: newConf + '%', st: 'strong'};
      }
      return c;
    });
    if (oldConf === 0) oldConf = 45;
    setChartData(newData);
    updatedMsgs.push({role:'assistant', content:`Confidence improved from ${oldConf}% to ${newConf}% for Element ${am.elementId}`});
    setMsgs(updatedMsgs);
  };

  const handleReject = (msgIndex) => {
    const updatedMsgs = [...msgs];
    updatedMsgs[msgIndex] = { ...msgs[msgIndex], rejected: true };
    updatedMsgs.push({role:'assistant', content:"I understand. I won't apply that change."});
    setMsgs(updatedMsgs);
  };

  const handleDemoQuestionClick = (demo) => {
    setInp(demo.userMessage);
    setDemoPanelOpen(false);
  };

  return (
    <div className="flex flex-1 overflow-hidden">
      <div className="flex-1 flex flex-col overflow-hidden border-r border-gray-200">
        <div className="p-5 border-b border-gray-100 flex items-start justify-between">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <button onClick={()=>sv('allClaims')} className="text-blue-700 hover:underline text-sm font-semibold">← Claims</button>
            </div>
            <h1 className="text-2xl font-bold">US123456 vs Acme Thermostat</h1>
            <p className="text-slate-400 text-sm">Patent Infringement Analysis &amp; Evidence Mapping</p>
          </div>
          <div className="flex gap-2">
            <button className="border border-gray-300 bg-white px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2">🕐 View History</button>
            <button className="bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold">↓ Export to Word</button>
          </div>
        </div>
        <div className="flex-1 overflow-y-auto p-5">
          <table className="w-full border border-gray-100 rounded-2xl overflow-hidden">
            <thead>
              <tr className="bg-gray-50 border-b border-gray-100">
                {['CLAIM ELEMENT','SPECIFICATION SUPPORT','EVIDENCE CONFIDENCE'].map(h => <th key={h} className="px-4 py-3 text-left text-[11px] font-bold uppercase tracking-widest text-slate-400">{h}</th>)}
              </tr>
            </thead>
            <tbody>
              {chartData.map(r => (
                <tr key={r.id} className={"border-b border-gray-50 last:border-0 " + (r.st==='weak'?'bg-orange-50':r.st==='pending'?'bg-gray-50':'bg-white')}>
                  <td className="px-4 py-4">
                    <p className="font-bold text-sm">{r.id}. {r.element}</p>
                    <p className="text-xs text-slate-400 mt-0.5 leading-relaxed">{r.desc}</p>
                  </td>
                  <td className="px-4 py-4 text-sm text-slate-600">{r.spec}</td>
                  <td className="px-4 py-4">
                    <div className={"flex items-center gap-1.5 text-sm font-bold "+(r.st==='strong'?'text-green-600':r.st==='weak'?'text-orange-600':'text-slate-400')}>
                      <span>{r.st==='strong'?'✓':r.st==='weak'?'⚠':'○'}</span>{r.conf}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="grid grid-cols-2 gap-4 mt-4">
            <div className="bg-white border border-gray-200 rounded-2xl p-5">
              <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Claim Strength Score</p>
              <p className="text-4xl font-bold text-blue-700 mb-2">82%</p>
              <div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-blue-700 rounded-full" style={{width:'82%'}}></div></div>
            </div>
            <div className="bg-white border border-orange-200 rounded-2xl p-5">
              <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Action Items</p>
              <div className="space-y-1.5">
                <div className="flex items-center gap-2 text-sm text-red-600 font-semibold"><span>!</span>1 Critical Refinement Needed</div>
                <div className="flex items-center gap-2 text-sm text-green-600 font-semibold"><span>✓</span>14 Evidence points validated</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div className="w-80 flex flex-col bg-gray-50 relative">
        <div className="p-4 border-b border-gray-200 bg-white">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-full bg-blue-700 text-white flex items-center justify-center text-sm">AI</div>
              <div>
                <p className="text-sm font-bold">AI Refinement Assistant</p>
                <p className={"text-[10px] font-bold uppercase " + (demoMode ? "text-purple-600" : "text-green-600")}>{demoMode ? "● Demo Mode" : "● Active"}</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={() => { setDemoMode(!demoMode); setDemoPanelOpen(false); }} className={"text-[10px] font-bold px-3 py-1.5 rounded-full border transition-all " + (demoMode ? "bg-purple-100 text-purple-700 border-purple-300" : "bg-gray-100 text-gray-500 border-gray-200 hover:bg-purple-50 hover:text-purple-600 hover:border-purple-200")}>
                {demoMode ? "✦ Demo ON" : "Demo Mode"}
              </button>
              <button className="text-slate-400">⚙️</button>
            </div>
          </div>
        </div>

        {demoMode && (
          <div className="px-3 py-2 bg-purple-50 border-b border-purple-200">
            <button onClick={() => setDemoPanelOpen(!demoPanelOpen)} className="w-full flex items-center justify-between text-sm font-semibold text-purple-700">
              <span>📋 Browse {DEMO_CONVERSATIONS.length} Demo Questions</span>
              <span className="text-lg">{demoPanelOpen ? '▲' : '▼'}</span>
            </button>
          </div>
        )}

        {demoPanelOpen && (
          <div className="absolute top-24 left-0 right-0 bottom-16 bg-white z-40 overflow-y-auto border-b border-gray-200 shadow-lg">
            <div className="p-3">
              {DEMO_CATEGORIES.map(cat => (
                <div key={cat} className="mb-3">
                  <p className="text-[10px] font-bold text-purple-600 uppercase tracking-widest mb-1.5 px-1">{cat} ({DEMO_CONVERSATIONS.filter(d=>d.category===cat).length})</p>
                  <div className="space-y-1">
                    {DEMO_CONVERSATIONS.filter(d => d.category === cat).map(d => (
                      <button key={d.id} onClick={() => handleDemoQuestionClick(d)} className="w-full text-left px-3 py-2 text-xs text-slate-700 rounded-lg hover:bg-purple-50 hover:text-purple-700 transition-colors leading-relaxed border border-transparent hover:border-purple-200">
                        {d.userMessage}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="flex-1 overflow-y-auto p-4 space-y-3">
          {msgs.map((m, i) => (
            <div key={i} className={"text-sm rounded-xl p-3 leading-relaxed " + (m.role==='user'?'bg-blue-700 text-white ml-6':'bg-white border border-gray-200 text-slate-700 shadow-sm')}>
              {m.content}
              {m.amendment && !m.accepted && !m.rejected && (
                <div className="mt-3 bg-blue-50 border border-blue-200 rounded-xl p-3">
                  <p className="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-2">💡 Suggested Amendment</p>
                  <p className="text-xs text-blue-800 italic leading-relaxed">{m.amendment.newValue}</p>
                  <div className="flex gap-2 mt-3">
                    <button onClick={() => handleAccept(i)} className="flex-1 bg-green-600 text-white py-1.5 rounded-lg text-xs font-bold">✓ Accept</button>
                    <button onClick={() => handleReject(i)} className="flex-1 bg-red-50 text-red-600 border border-red-200 py-1.5 rounded-lg text-xs font-bold">✗ Reject</button>
                  </div>
                </div>
              )}
              {m.amendment && m.accepted && (
                <div className="mt-2 bg-green-50 border border-green-200 rounded-lg px-3 py-1.5">
                  <p className="text-[10px] font-bold text-green-600">✓ ACCEPTED — Chart Updated</p>
                </div>
              )}
              {m.amendment && m.rejected && (
                <div className="mt-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5">
                  <p className="text-[10px] font-bold text-gray-400">✗ REJECTED — No Changes</p>
                </div>
              )}
            </div>
          ))}
          {loading && (
            <div className="text-xs text-slate-400 flex items-center gap-1">
              <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></span>
              <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce" style={{animationDelay:'0.1s'}}></span>
              <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce" style={{animationDelay:'0.2s'}}></span>
              <span className="ml-1">{demoMode ? "Loading demo response..." : "AI is thinking..."}</span>
            </div>
          )}
          <div ref={endRef}/>
        </div>

        {chipsVisible && (
          <div className="flex gap-2 p-3 mb-2 justify-center flex-wrap">
            {activeChips.map(s => (
              <button key={s} onClick={() => handleChipClick(s)} className="text-[11px] bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-full font-semibold hover:bg-blue-100">{s}</button>
            ))}
          </div>
        )}

        <div className="p-4 border-t border-gray-200 bg-white">
          <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2">
            <span className="text-slate-400">📎</span>
            <input value={inp} onChange={e => setInp(e.target.value)} onKeyDown={e => e.key==='Enter' && sendMessage(inp)} className="flex-1 bg-transparent text-sm outline-none border-none" placeholder={demoMode ? "Select a demo question or type..." : "Type instructions or ask a question..."}/>
            <button onClick={() => sendMessage(inp)} disabled={loading||!inp.trim()} className={"w-9 h-9 rounded-xl flex items-center justify-center text-white "+(loading||!inp.trim()?'bg-blue-300':'bg-blue-700 hover:bg-blue-800')}>→</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ProfileView({sv}){return <div className="flex-1 overflow-y-auto"><div className="h-32 bg-blue-800"></div><div className="px-8 pb-8 -mt-8"><div className="flex items-end justify-between mb-8"><div className="flex items-end gap-5"><div className="w-20 h-20 rounded-2xl bg-blue-700 text-white font-bold text-2xl flex items-center justify-center border-4 border-white shadow-lg">AS</div><div className="mb-2"><h1 className="text-2xl font-bold">Arav Sharma</h1><p className="text-blue-600 font-semibold">Senior Patent Analyst</p></div></div><div className="flex items-center gap-8 mb-2"><div className="text-center"><p className="text-2xl font-bold text-blue-700">124</p><p className="text-xs text-slate-400">Claims</p></div><div className="text-center"><p className="text-2xl font-bold text-blue-700">3</p><p className="text-xs text-slate-400">Projects</p></div><div className="text-center"><p className="text-2xl font-bold text-blue-700">98%</p><p className="text-xs text-slate-400">Acceptance</p></div><button className="bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-bold">✏ Edit Profile</button></div></div><div className="grid grid-cols-4 gap-4 mb-6">{[{k:'Claims This Month',v:'42',s:'↑+12%'},{k:'Avg Confidence',v:'94%',s:'Stable level'},{k:'AI Accepted',v:'88',s:'↑+5%'},{k:'Exports',v:'15',s:'Last 30 days'}].map(({k,v,s})=><div key={k} className="bg-white rounded-2xl border border-gray-200 p-4"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">{k}</p><p className="text-3xl font-bold">{v}</p><p className="text-xs text-slate-400 mt-1">{s}</p></div>)}</div><div className="grid grid-cols-3 gap-5"><div className="space-y-4"><div className="bg-white rounded-2xl border border-gray-200 p-5"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Contact Information</p><div className="space-y-2"><div className="flex items-center gap-2 text-sm"><span>✉️</span><span>arav.sharma@lumenci.ai</span></div><div className="flex items-center gap-2 text-sm"><span>📍</span><span>New York, NY</span></div><div className="flex items-center gap-2 text-sm"><span>📅</span><span>Joined Lumenci • October 2021</span></div></div></div><div className="bg-white rounded-2xl border border-gray-200 p-5"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Skills &amp; Expertise</p><div className="flex flex-wrap gap-2">{['Patent Law','IP Litigation','Prior Art Search','Technical Analysis','Claim Drafting','Neural Networks'].map(s=><span key={s} className={"text-xs font-semibold px-3 py-1 rounded-full border "+(s==='Neural Networks'?'bg-orange-50 text-orange-600 border-orange-200':'border-gray-200 text-slate-600')}>{s}</span>)}</div></div></div><div className="col-span-2 bg-white rounded-2xl border border-gray-200 p-5"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Recent Projects</p><div className="space-y-3">{[{name:'Project Helios 2.0',desc:'Semiconductor innovations for 2025',prog:75,c:'bg-blue-700'},{name:'Neural Interface V3',desc:'Drafting biomechanical sensor claims',prog:40,c:'bg-blue-500'},{name:'Data Privacy Core',desc:'Encryption protocol standardization',prog:100,c:'bg-green-500'}].map(({name,desc,prog,c})=><div key={name} className="flex items-center gap-4 py-2 border-b border-gray-50 last:border-0"><div className="w-9 h-9 rounded-xl bg-blue-50 flex items-center justify-center text-lg shrink-0">🚀</div><div className="flex-1"><p className="text-sm font-bold">{name}</p><p className="text-xs text-slate-400">{desc}</p></div><div className="w-32"><div className="flex justify-between text-[11px] mb-1"><span className="text-slate-400">PROGRESS</span><span className="font-bold">{prog}%</span></div><div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className={"h-full rounded-full "+c} style={{width:prog+"%"}}></div></div></div></div>)}</div></div></div></div></div>;}
